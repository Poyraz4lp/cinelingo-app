        .config-section {

        .backup-btn {

        .tabs {

            border-bottom: 2px solid var(--border);
            padding-bottom: 10px;
        }

        .tab-btn {

            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-light);
            cursor: pointer;
            border-radius: 8px;
        }

        .tab-btn.active {
            background-color: var(--bg-card);
            color: var(--primary);

        }

        .tab-content { display: none; }

        .subtitle-stream {

        .clickable-word {
            display: inline-block;
            padding: 2px 5px;
            margin: 1px;
            border-radius: 6px;
            cursor: pointer;
            background-color: rgba(255,255,255,0.05);
        }
        .clickable-word:hover { background-color: var(--primary); color: white; }

            font-size: 1rem;
            width: 100%;
            box-sizing: border-box;
        }

        .audio-btn {
            background: #2a2f45;
            border: 1px solid var(--border);
            color: var(--secondary);
            font-size: 1.2rem;
            padding: 11px 14px;

            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .audio-btn:hover {
            background: var(--secondary);
            color: #12141c;
            transform: scale(1.05);
        }

            background-color: var(--success);
            color: #12141c;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
        }

        .word-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
